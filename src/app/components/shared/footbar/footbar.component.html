<footer
  class="fixed bottom-0 right-0 z-20 h-12 transition-all duration-300"
  [ngClass]="collapsed ? 'left-22' : 'left-54'"
  [style.background]="'var(--card)'"
  [style.borderTop]="'1px solid var(--border)'"
>
  <div class="flex items-center justify-between h-full px-6 text-xs">

    <span [style.color]="'var(--text-muted)'">
      © 2026 Jux Admin
    </span>

    <div class="flex gap-4">
      <a [style.color]="'var(--text-muted)'">Privacy</a>
      <a [style.color]="'var(--text-muted)'">Terms</a>
      <a [style.color]="'var(--text-muted)'">Support</a>
    </div>

  </div>
</footer>
