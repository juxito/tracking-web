<header
  class="fixed top-0 right-0 z-30 h-16 bg-[var(--card)] border-b border-[var(--border)] transition-all duration-300"
  [ngClass]="collapsed ? 'left-16' : 'left-64'"
>
  <div class="flex items-center justify-between h-full px-6">

    <h1 class="text-lg font-semibold">Panel de Administración</h1>

    <div class="flex items-center gap-3">

      <!-- Notifications -->
      <div class="relative">
        <button
          (click)="showNotifications = !showNotifications; showUserMenu = false"
          class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700"
        >
          <mat-icon>notifications</mat-icon>
        </button>

        <div *ngIf="showNotifications"
             class="absolute right-0 top-12 w-72 bg-white dark:bg-gray-800 border rounded-xl shadow-lg">
          <div class="p-3 font-semibold">Notificaciones</div>
          <div *ngFor="let n of notifications" class="p-3 border-t text-sm">
            {{ n.title }}
            <div class="text-xs opacity-60">{{ n.time }}</div>
          </div>
        </div>
      </div>

      <!-- Settings -->
      <button class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700">
        <mat-icon>settings</mat-icon>
      </button>

      <!-- User -->
      <div class="relative">
        <button
          (click)="showUserMenu = !showUserMenu; showNotifications = false"
          class="flex items-center gap-2 p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-700"
        >
          <div class="w-8 h-8 bg-blue-500 text-white flex items-center justify-center rounded-full">
            JD
          </div>
          <span class="hidden md:block">John Doe</span>
          <mat-icon>expand_more</mat-icon>
        </button>

        <div *ngIf="showUserMenu"
             class="absolute right-0 top-12 w-56 bg-white dark:bg-gray-800 border rounded-xl shadow-lg">

          <button class="w-full flex items-center gap-2 p-3 hover:bg-gray-100 dark:hover:bg-gray-700">
            <mat-icon>person</mat-icon> My Account
          </button>

          <button class="w-full flex items-center gap-2 p-3 hover:bg-gray-100 dark:hover:bg-gray-700">
            <mat-icon>group</mat-icon> Profiles
          </button>

          <button class="w-full flex items-center gap-2 p-3 hover:bg-gray-100 dark:hover:bg-gray-700">
            <mat-icon>settings</mat-icon> Settings
          </button>

          <hr />

          <button class="w-full flex items-center gap-2 p-3 text-red-500 hover:bg-red-100">
            <mat-icon>logout</mat-icon> Log out
          </button>

        </div>
      </div>

    </div>
  </div>
</header>
