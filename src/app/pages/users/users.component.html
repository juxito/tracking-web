<h1 class="text-2xl font-bold mb-4">USERS</h1>

<div class="p-6">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6">
    <input placeholder="Buscar usuarios..."
           class="input" />

    <div class="flex gap-2">
      <button (click)="toggleView('cards')">Tarjetas</button>
      <button (click)="toggleView('table')">Tabla</button>

      <button (click)="openCreate()">+ Añadir Usuario</button>
    </div>
  </div>

  <!-- CARDS -->
  <div *ngIf="viewMode === 'cards'"
       class="grid grid-cols-3 gap-4">

    <div *ngFor="let user of users$ | async"
         class="card"
         (click)="openEdit(user)">

      <h3>{{ user.name }}</h3>
      <p>{{ user.email }}</p>
      <span>{{ user.role }}</span>

    </div>

  </div>

  <!-- TABLE -->
  <table *ngIf="viewMode === 'table'">
    <tr *ngFor="let user of users$ | async"
        (click)="openEdit(user)">
      <td>{{ user.name }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.role }}</td>
    </tr>
  </table>

  <!-- SIDENAV -->
  <app-user-sidenav
    [open]="sidenavOpen"
    [user]="selectedUser"
    (close)="closeSidenav()">
  </app-user-sidenav>

</div>
